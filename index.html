<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Image Gallery</h1>
        <p>Responsive Gallery with Filters & Lightbox</p>
    </header>

    <!-- Filter Buttons -->
    <div class="filter-container">
        <button class="filter-btn active" onclick="filterImages('all')">All</button>
        <button class="filter-btn" onclick="filterImages('nature')">Nature</button>
        <button class="filter-btn" onclick="filterImages('city')">City</button>
        <button class="filter-btn" onclick="filterImages('animals')">Animals</button>
    </div>

    <!-- Gallery -->
    <div class="gallery">

        <div class="gallery-item nature">
            <img src="https://picsum.photos/id/10/600/400" alt="Nature">
        </div>

        <div class="gallery-item city">
            <img src="https://picsum.photos/id/1011/600/400" alt="City">
        </div>

        <div class="gallery-item animals">
            <img src="https://picsum.photos/id/237/600/400" alt="Dog">
        </div>

        <div class="gallery-item nature">
            <img src="https://picsum.photos/id/1043/600/400" alt="Forest">
        </div>

        <div class="gallery-item city">
            <img src="https://picsum.photos/id/1031/600/400" alt="Building">
        </div>

        <div class="gallery-item animals">
            <img src="https://picsum.photos/id/1025/600/400" alt="Animal">
        </div>

        <div class="gallery-item nature">
            <img src="https://picsum.photos/id/1003/600/400" alt="Mountain">
        </div>

        <div class="gallery-item city">
            <img src="https://picsum.photos/id/1015/600/400" alt="City">
        </div>

    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span class="close">&times;</span>

        <button class="prev">&#10094;</button>

        <img id="lightbox-img" src="" alt="">

        <button class="next">&#10095;</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
